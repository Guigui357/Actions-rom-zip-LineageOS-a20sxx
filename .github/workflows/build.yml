name: Build A20s ROM in Root

on:
  workflow_dispatch:

jobs:
  build-rom:
    runs-on: ubuntu-latest
    env:
      DEVICE: a20s
      LINEAGE_BRANCH: lineage-20.0
      DT_REPO_SSH: git@gitgud.io:GUGUGSI/a20sxx-gsi-a207m.git
      KERNEL_REPO: https://github.com/goldfish07/android_kernel_samsung_a20sxx_old.git
      VENDOR_REPO: https://github.com/GalaxyA20s/vendor_samsung_a20s.git
      THREADS: 4
      OUTPUT_DIR: ~/a20s-lineage/zip/samsung/$DEVICE

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup SSH key
      uses: webfactory/ssh-agent@v0.8.1
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Install Build Tools
      run: |
        sudo apt update
        sudo apt install -y build-essential zip unzip curl git-core \
        openjdk-11 flex bison gperf zlib1g-dev gcc-multilib g++-multilib \
        libc6-dev-i386 libncurses5 libncurses5-dev x11proto-core-dev \
        libx11-dev libreadline-dev libgl1-mesa-dev libxml2-utils xsltproc \
        python3 python3-pip cpio abootimg

    - name: Repo init & sync
      run: |
        cd ~/a20s-lineage
        repo init -u https://github.com/LineageOS/android.git -b $LINEAGE_BRANCH
        repo sync -c -j$THREADS --verbose

    - name: Clone device tree
      run: |
        mkdir -p ~/a20s-lineage/device/samsung
        git clone $DT_REPO_SSH ~/a20s-lineage/device/samsung/$DEVICE

    - name: Clone kernel
      run: |
        mkdir -p ~/a20s-lineage/kernel
        git clone $KERNEL_REPO ~/a20s-lineage/kernel/$DEVICE

    - name: Clone vendor blobs
      run: |
        mkdir -p ~/a20s-lineage/vendor/samsung
        git clone $VENDOR_REPO ~/a20s-lineage/vendor/samsung/$DEVICE

    - name: Setup build environment
      run: |
        cd ~/a20s-lineage
        source build/envsetup.sh
        lunch lineage_${DEVICE}-userdebug

    - name: Compile ROM with mka bacon
      run: |
        cd ~/a20s-lineage
        mka bacon -j$THREADS

    - name: Move final ZIP to organized folder
      run: |
        mkdir -p $OUTPUT_DIR
        ZIP_FILE=$(find ~/a20s-lineage/out/target/product/$DEVICE -maxdepth 1 -name "*$DEVICE*.zip" | head -n 1)
        cp $ZIP_FILE $OUTPUT_DIR/A20s_ROM.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: A20s_ROM
        path: $OUTPUT_DIR/A20s_ROM.zip
