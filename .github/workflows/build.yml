name: Build A20s boot

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      KERNEL_REPO: https://github.com/Guigui357/android_kernel_samsung_a20sxx_old.git
      DEVICE: a20s
      THREADS: 2
      SWAP_SIZE: 6G
    steps:

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git bc bison flex build-essential gcc-aarch64-linux-gnu \
          libssl-dev libncurses-dev device-tree-compiler android-sdk-libsparse-utils \
          cpio curl zip python3

    - name: View RAM (debug)
      run: cat /proc/meminfo | grep MemTotal
      
    - name: Clone kernel
      run: git clone --depth=1 $KERNEL_REPO kernel

    - name: Compile kernel
      run: |
        cd kernel
        make help
        bash build_kernel.sh
        

    - name: Upload boot image
      uses: actions/upload-artifact@v4
      with:
        name: kernel-image
        path: kernel/arch/arm64/boot/Image.gz
