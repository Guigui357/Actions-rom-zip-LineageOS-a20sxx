name: Build LineageOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        df -h

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git repo openjdk-11-jdk bc bison build-essential curl flex g++ \
        gcc-multilib g++-multilib gnupg gperf imagemagick lib32ncurses5-dev \
        lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev \
        libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool \
        squashfs-tools xsltproc zip zlib1g-dev ccache

    - name: Setup git
      run: |
        git config --global user.email "github@actions.com"
        git config --global user.name "github-actions"

    - name: Init Lineage source
      run: |
        mkdir lineage
        cd lineage
        repo init -u https://github.com/LineageOS/android.git -b lineage-18.1

    - name: Sync source
      run: |
        cd lineage
        repo sync -c -j8

    - name: Clone device tree
      run: |
        cd lineage
        git clone https://gitgud.io/fw-dumps/samsung/a20s.git device/samsung/a20s

    - name: Enable ccache
      run: |
        export USE_CCACHE=1
        ccache -M 50G

    - name: Build ROM
      run: |
        cd lineage
        source build/envsetup.sh
        lunch lineage_a20s-userdebug
        make bacon -j8

    - name: Upload ROM
      uses: actions/upload-artifact@v4
      with:
        name: lineage_a20s
        path: lineage/out/target/product/a20s/*.zip
