name: Build GSI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/lib/android
        df -h

    - name: Install packages
      run: |
        sudo apt update
        sudo apt install -y git repo openjdk-11-jdk \
        bc bison build-essential curl flex g++ gcc-multilib \
        g++-multilib gnupg gperf imagemagick lib32ncurses5-dev \
        lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev \
        libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop \
        pngcrush rsync schedtool squashfs-tools xsltproc zip \
        zlib1g-dev

    - name: Init repo
      run: |
        mkdir gsi
        cd gsi
        repo init -u https://github.com/LineageOS/android.git -b lineage-18.1

    - name: Sync source
      run: |
        cd gsi
        repo sync -c -j8 --no-tags --no-clone-bundle

    - name: Add device tree
      run: |
        cd gsi
        git clone https://gitgud.io/GUGUGSI/a20sxx-gsi-a207m.git
        mkdir -p device/samsung/a20s
        cp -r a20sxx-gsi-a207m/lineage_device_tree/* device/samsung/a20s/

    - name: Build
      run: |
        cd gsi
        source build/envsetup.sh
        lunch lineage_a20s-userdebug
        mka bacon

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: lineage_build
        path: gsi/out/target/product/a20s
