name: Build A20s Full Boot + DTB

on:
  workflow_dispatch:

jobs:
  build-boot:
    runs-on: ubuntu-latest
    env:
      DEVICE: a20s
      DT_LINK: "https://gitgud.io/GUGUGSI/a20sxx-gsi-a207m/-/archive/a20sxx-user-11-RP1A.200720.012-A207FXXU5CWH1-release-keys/a20sxx-gsi-a207m-a20sxx-user-11-RP1A.200720.012-A207FXXU5CWH1-release-keys.tar.gz?ref_type=heads&path=lineage-device-tree"
      KERNEL_REPO: https://github.com/goldfish07/android_kernel_samsung_a20sxx_old.git
      THREADS: 4
      OUTPUT_DIR: ~/a20s-lineage/zip/samsung/$DEVICE

    steps:
    - name: Checkout workflow repo
      uses: actions/checkout@v3

    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
          zip unzip curl git \
          openjdk-17-jdk flex bison gperf zlib1g-dev \
          libncurses-dev libx11-dev libreadline-dev libgl1-mesa-dev \
          libxml2-utils xsltproc python3 python3-pip \
          cpio abootimg device-tree-compiler

    - name: Download only lineage-device-tree
      run: |
        mkdir -p ~/a20s-lineage/lineage-device-tree
        cd ~/a20s-lineage/lineage-device-tree
        curl -L "$DT_LINK" | tar -xz --strip-components=3

    - name: Clone Kernel C shallow
      run: |
        mkdir -p ~/a20s-lineage/kernel
        git clone --depth=1 $KERNEL_REPO ~/a20s-lineage/kernel/$DEVICE

    - name: Create minimal ramdisk
      run: |
        mkdir -p ~/a20s-lineage/ramdisk_root
        echo -e "#!/bin/sh\nexit 0" > ~/a20s-lineage/ramdisk_root/init
        chmod +x ~/a20s-lineage/ramdisk_root/init
        cd ~/a20s-lineage/ramdisk_root
        find . | cpio -o -H newc > ../ramdisk.cpio

    - name: Compile kernel
      run: |
        cd ~/a20s-lineage/kernel/$DEVICE
        make O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j$THREADS \
            Image.gz dtbs

    - name: Generate dtb.img
      run: |
        mkdir -p ~/a20s-lineage/out-dtb
        mkdtimg create ~/a20s-lineage/out-dtb/dtb.img \
          --page_size 2048 arch/arm64/boot/dts/vendor/samsung/*.dtb

    - name: Build boot.img
      run: |
        KERNEL_IMG=~/a20s-lineage/kernel/$DEVICE/out/arch/arm64/boot/Image.gz
        mkbootimg --kernel $KERNEL_IMG \
                  --ramdisk ~/a20s-lineage/ramdisk.cpio \
                  --dtb ~/a20s-lineage/out-dtb/dtb.img \
                  --output ~/a20s-lineage/boot.img

    - name: Create flashable ZIP
      run: |
        mkdir -p $OUTPUT_DIR/META-INF/com/google/android
        cp ~/a20s-lineage/boot.img $OUTPUT_DIR/
        cp ~/a20s-lineage/out-dtb/dtb.img $OUTPUT_DIR/
        cat > $OUTPUT_DIR/META-INF/com/google/android/updater-script <<EOF
        ui_print("Flashing A20s full boot + dtb");
        package_extract_file("boot.img", "/dev/block/by-name/boot");
        package_extract_file("dtb.img", "/dev/block/by-name/dtb");
        EOF
        cd $OUTPUT_DIR
        zip -r ../A20s_ROM.zip *
        cd ~/a20s-lineage

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: A20s_Full_ROM
        path: $OUTPUT_DIR/../A20s_ROM.zip
