name: Build A20s boot + dtbo

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      KERNEL_REPO: https://github.com/Guigui357/android_kernel_samsung_a20sxx_old.git
      DEVICE: a20s
      THREADS: 4

    steps:

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git bc bison flex \
          build-essential \
          gcc-aarch64-linux-gnu \
          libssl-dev libncurses-dev \
          device-tree-compiler \
          android-sdk-libsparse-utils \
          cpio curl zip python3

    - name: Download mkbootimg
      run: |
        curl -L https://raw.githubusercontent.com/osm0sis/mkbootimg/master/mkbootimg -o mkbootimg
        chmod +x mkbootimg

    - name: Clone kernel
      run: |
        git clone --depth=1 $KERNEL_REPO kernel

    - name: Compile kernel
      run: |
        cd kernel
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-

        make a20s_eur_open_defconfig
        make -j$THREADS

    - name: Collect DTB files
      run: |
        mkdir dtb
        find kernel/arch/arm64/boot/dts -name "*.dtb" -exec cp {} dtb/ \;

    - name: Create dtbo.img
      run: |
        mkdtimg create dtbo.img dtb/*.dtb

    - name: Create minimal ramdisk
      run: |
        mkdir ramdisk
        echo '#!/bin/sh' > ramdisk/init
        echo 'exec /init' >> ramdisk/init
        chmod +x ramdisk/init

        cd ramdisk
        find . | cpio -o -H newc > ../ramdisk.cpio

    - name: Build boot.img
      run: |
        ./mkbootimg \
          --kernel kernel/arch/arm64/boot/Image.gz \
          --ramdisk ramdisk.cpio \
          --base 0x10000000 \
          --pagesize 2048 \
          --os_version 11 \
          --header_version 1 \
          --output boot.img

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: A20s_boot_dtbo
        path: |
          boot.img
          dtbo.img
