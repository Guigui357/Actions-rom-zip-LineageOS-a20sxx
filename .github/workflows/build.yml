name: Build A20s Boot DTBO VBMeta

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DEVICE: a20s
      THREADS: 4
      KERNEL_REPO: https://github.com/goldfish07/android_kernel_samsung_a20sxx_old.git
      DT_LINK: https://gitgud.io/GUGUGSI/a20sxx-gsi-a207m/-/archive/a20sxx-user-11-RP1A.200720.012-A207FXXU5CWH1-release-keys/a20sxx-gsi-a207m-a20sxx-user-11-RP1A.200720.012-A207FXXU5CWH1-release-keys.tar.gz

    steps:

    - name: Checkout
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y 
        git curl zip unzip bc 
        build-essential 
        gcc-aarch64-linux-gnu 
        flex bison 
        libssl-dev libncurses5-dev 
        libelf-dev dwarves 
        device-tree-compiler 
        cpio python3

    - name: Install mkbootimg + avbtool
      run: |
        git clone https://github.com/osm0sis/mkbootimg.git
        sudo cp mkbootimg/mkbootimg /usr/local/bin/
        sudo chmod +x /usr/local/bin/mkbootimg

        git clone https://github.com/AndroidBootloader/platform_external_avb
        sudo cp platform_external_avb/avbtool /usr/local/bin/
        sudo chmod +x /usr/local/bin/avbtool

    - name: Download lineage-device-tree
      run: |
        mkdir ~/device
        cd ~/device

        curl -L $DT_LINK -o dt.tar.gz
        tar -xzf dt.tar.gz

        mv /lineage-device-tree ./a20s-tree

    - name: Clone kernel
      run: |
        mkdir ~/kernel
        git clone --depth=1 $KERNEL_REPO ~/kernel/$DEVICE

    - name: Compile kernel
      run: |
        cd ~/kernel/$DEVICE

        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-

        make O=out exynos7885-a20s_defconfig
        make O=out -j$THREADS

    - name: Collect DTB
      run: |
        mkdir ~/dtb
        find ~/kernel/$DEVICE/out -name ".dtb" -exec cp {} ~/dtb/ ;

        cat ~/dtb/.dtb > ~/dtb.img

    - name: Create DTBO image
      run: |
        mkdir ~/dtbo
        find ~/kernel/$DEVICE/out -name ".dtbo" -exec cp {} ~/dtbo/ ; || true

        if ls ~/dtbo/.dtbo 1> /dev/null 2>&1; then
          cat ~/dtbo/.dtbo > /dtbo.img
        else
          dd if=/dev/zero of=/dtbo.img bs=1M count=1
        fi

    - name: Create ramdisk
      run: |
        mkdir ~/ramdisk
        echo '#!/system/bin/sh' > ~/ramdisk/init
        echo 'exec /init' >> ~/ramdisk/init
        chmod +x ~/ramdisk/init

        cd ~/ramdisk
        find . | cpio -H newc -o > /ramdisk.cpio

    - name: Build boot.img
      run: |
        KERNEL=/kernel/$DEVICE/out/arch/arm64/boot/Image.gz

        mkbootimg 
        --kernel $KERNEL 
        --ramdisk ~/ramdisk.cpio 
        --dtb ~/dtb.img 
        --base 0x10000000 
        --pagesize 2048 
        --output ~/boot.img

    - name: Create vbmeta disabled
      run: |
        avbtool make_vbmeta_image 
        --flags 2 
        --padding_size 4096 
        --output ~/vbmeta.img

    - name: Create flashable zip
      run: |
        mkdir -p ~/zip/META-INF/com/google/android

        cp ~/boot.img ~/zip/
        cp ~/dtbo.img ~/zip/
        cp ~/vbmeta.img ~/zip/

        cat > ~/zip/META-INF/com/google/android/updater-script <<EOF
        ui_print("Flashing boot dtbo vbmeta for A20s");
        package_extract_file("boot.img", "/dev/block/by-name/boot");
        package_extract_file("dtbo.img", "/dev/block/by-name/dtbo");
        package_extract_file("vbmeta.img", "/dev/block/by-name/vbmeta");
        ui_print("Done");
        EOF

        cd ~/zip
        zip -r ~/A20s_flash_bundle.zip *

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: A20s_flash_bundle
        path: ~/A20s_flash_bundle.zip
